# GRFICSv3 host-specific network override
# Sets the macvlan parent to the host's default-route interface.
# MACVLAN_PARENT is exported by start-lab.sh (auto-detected) or can be
# set manually: export MACVLAN_PARENT=eth0

networks:
  b-ics-net:
    driver: macvlan
    driver_opts:
      parent: ${MACVLAN_PARENT:-eth0}
    ipam:
      config:
        - subnet: 192.168.95.0/24
          gateway: 192.168.95.1

  c-dmz-net:
    driver: macvlan
    driver_opts:
      parent: ${MACVLAN_PARENT:-eth0}
    ipam:
      config:
        - subnet: 192.168.90.0/24
          gateway: 192.168.90.1
