# Armis Network Monitor Integration
# Usage: docker compose -f docker-compose.yml -f armis-monitoring.yml up -d
# 
# Environment variables required:
#   - ARMIS_API_KEY: Your Armis API token
#   - ARMIS_HOSTNAME: lab-kudelski.armis.com
#   - ARMIS_TENANT_ID: (optional) Your tenant ID

services:
  # ============================================================================
  # PCAP Capture Service - Captures OT protocol traffic in real-time
  # ============================================================================
  armis-pcap-capture:
    image: nicolaka/netshoot:latest
    container_name: armis-pcap-capture
    cap_add:
      - NET_ADMIN
    # Share the router's network namespace so tcpdump sees ALL inter-network
    # traffic (admin↔ICS↔DMZ) without macvlan promiscuous-mode limitations.
    # The router is the chokepoint for every packet in the lab.
    network_mode: "service:router"
    depends_on:
      - router
    command: ["sh", "-c", "mkdir -p /pcap && exec tcpdump -i any -w /pcap/capture-%Y%m%d%H%M%S.pcap -G 300 'port 502 or port 44818 or port 102 or port 4840 or port 5000 or port 6080 or port 6081 or port 8080'"]
    volumes:
      - armis_pcap:/pcap
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ls", "-l", "/pcap"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # NOTE: armis-pcap-uploader removed — Armis v4.5 API has no PCAP upload endpoint.
  # Traffic ingestion is handled by the Armis vSensor (QCOW2/KVM VM).
  # Deploy with: sudo -E ./scripts/armis-collector-setup.sh
  # The PCAP capture service above is retained for local forensic storage.

  # ============================================================================
  # Network Statistics Exporter (Optional) - For Netflow/sFlow
  # ============================================================================
  armis-flow-exporter:
    image: nicolaka/netshoot:latest
    container_name: armis-flow-exporter
    cap_add:
      - NET_ADMIN
    environment:
      STATS_INTERVAL: "60"  # Export stats every 60 seconds
    command: >
      bash -c "
      mkdir -p /stats &&
      while true; do
        echo '[' > /stats/flows.json &&
        ss -itan | tail -n +2 | while read line; do
          proto=\$$(echo \$$line | awk '{print \$$1}') &&
          local=\$$(echo \$$line | awk '{print \$$4}') &&
          remote=\$$(echo \$$line | awk '{print \$$5}') &&
          echo '{\"proto\":\"'\$$proto'\",\"local\":\"'\$$local'\",\"remote\":\"'\$$remote'\"},' >> /stats/flows.json
        done &&
        echo '{}]' >> /stats/flows.json &&
        sleep 60
      done
      "
    networks:
      b-ics-net:
        ipv4_address: 192.168.95.251
    volumes:
      - armis_flow_stats:/stats
    restart: unless-stopped

  # ============================================================================
  # Syslog Aggregator (Optional) - Forwards router/IDS logs to Armis
  # ============================================================================
  armis-syslog-relay:
    image: rsyslog/rsyslog:latest
    container_name: armis-syslog-relay
    environment:
      ARMIS_SYSLOG_HOST: ${ARMIS_SYSLOG_HOST:-logs.armis.com}
      ARMIS_SYSLOG_PORT: ${ARMIS_SYSLOG_PORT:-6514}
    ports:
      - "514:514/udp"
      - "514:514/tcp"
    volumes:
      - ../scripts/rsyslog-armis.conf:/etc/rsyslog.d/99-armis.conf:ro
      - armis_syslog_queue:/var/spool/rsyslog
    networks:
      a-grfics-admin:
        ipv4_address: 172.18.0.51
      b-ics-net:
        ipv4_address: 192.168.95.252
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  armis_pcap:
    name: armis_pcap
    driver: local
  armis_flow_stats:
    name: armis_flow_stats
    driver: local
  armis_syslog_queue:
    name: armis_syslog_queue
    driver: local

# Armis vSensor (Collector) deployment — runs outside Docker as a KVM VM.
# The VM's second NIC is bridged to br-36e075768011 (grficsv3_a-grfics-admin)
# so it sees all lab traffic at layer 2.
# Setup: sudo -E ./scripts/armis-collector-setup.sh
