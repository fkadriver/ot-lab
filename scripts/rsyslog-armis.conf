# Armis Syslog Integration Configuration
# Forwards OT logs from GRFICSv3 components to Armis cloud
# 
# Configure these environment variables in armis-monitoring.yml:
#   ARMIS_SYSLOG_HOST - Armis syslog endpoint (default: logs.armis.com)
#   ARMIS_SYSLOG_PORT - Armis syslog port (default: 6514 for TLS)

# ============================================================================
# Module Loading
# ============================================================================

$ModLoad imtcp      # TCP input
$ModLoad imudp      # UDP input

# ============================================================================
# Input Configuration
# ============================================================================

# Listen for syslog on both TCP and UDP
$InputTCPServerRun 514
$UDPServerRun 514

# Maximum message size (OT logs can be verbose)
$MaxMessageSize 64k

# ============================================================================
# Message Parsing & Tagging
# ============================================================================

# Property replacer templates for structured logging
$template ArmisFmt,"%timestamp:::date-rfc3339% %hostname% %syslogtag% %msg%\n"
$template ArmisJSON,"<%pri%>%timestamp:::date-rfc3339% %hostname% %syslogtag% @cee: {\"host\":\"%hostname%\",\"source\":\"ot-lab\",\"type\":\"%syslogtag%\",\"message\":\"%msg%\"}\n"

# ============================================================================
# Firewall Log Processing
# ============================================================================

# Parse ulogd firewall logs from router container
:programname, isequal, "fwui_firewall" {
    # Tag for Armis (device class: Firewall)
    $template ArmisFirewallJSON,"<%pri%>%timestamp:::date-rfc3339% %hostname% fwui_firewall @cee: {\"host\":\"%hostname%\",\"source\":\"ot-lab\",\"device_type\":\"Firewall\",\"component\":\"fwui\",\"action\":\"firewall-rule\",\"message\":\"%msg%\"}\n"
    
    # Forward to Armis
    @@logs.armis.com:6514;ArmisFirewallJSON
    
    # Keep local copy
    /var/log/armis-forwarded/firewall.log;ArmisFirewallJSON
    & stop  # Don't process further
}

# ============================================================================
# IDS/Suricata Log Processing
# ============================================================================

# Parse Suricata IDS alerts
:programname, isequal, "suricata" {
    # Tag for Armis (device class: IDS)
    $template ArmisIDSJSON,"<%pri%>%timestamp:::date-rfc3339% %hostname% suricata @cee: {\"host\":\"%hostname%\",\"source\":\"ot-lab\",\"device_type\":\"IDS\",\"component\":\"suricata\",\"action\":\"ids-alert\",\"message\":\"%msg%\"}\n"
    
    # Forward to Armis
    @@logs.armis.com:6514;ArmisIDSJSON
    
    # Keep local copy
    /var/log/armis-forwarded/ids.log;ArmisIDSJSON
    & stop
}

# ============================================================================
# PLC/OpenPLC Log Processing  
# ============================================================================

# Parse OpenPLC runtime logs
:programname, isequal, "openplc" {
    $template ArmisPLCJSON,"<%pri%>%timestamp:::date-rfc3339% %hostname% openplc @cee: {\"host\":\"%hostname%\",\"source\":\"ot-lab\",\"device_type\":\"PLC\",\"component\":\"openplc\",\"protocol\":\"modbus\",\"message\":\"%msg%\"}\n"
    
    # Forward to Armis
    @@logs.armis.com:6514;ArmisPLCJSON
    
    # Keep local copy
    /var/log/armis-forwarded/plc.log;ArmisPLCJSON
    & stop
}

# ============================================================================
# HMI/SCADA Log Processing
# ============================================================================

# Parse SCADA HMI logs
:programname, isequal, "scadalts" {
    $template ArmisHMIJSON,"<%pri%>%timestamp:::date-rfc3339% %hostname% scadalts @cee: {\"host\":\"%hostname%\",\"source\":\"ot-lab\",\"device_type\":\"HMI\",\"component\":\"scadalts\",\"message\":\"%msg%\"}\n"
    
    # Forward to Armis
    @@logs.armis.com:6514;ArmisHMIJSON
    
    # Keep local copy
    /var/log/armis-forwarded/hmi.log;ArmisHMIJSON
    & stop
}

# ============================================================================
# Engineering Workstation Logs
# ============================================================================

# Parse EWS/Workstation logs
:programname, isequal, "ews" {
    $template ArmisEWSJSON,"<%pri%>%timestamp:::date-rfc3339% %hostname% ews @cee: {\"host\":\"%hostname%\",\"source\":\"ot-lab\",\"device_type\":\"Engineering Workstation\",\"message\":\"%msg%\"}\n"
    
    @@logs.armis.com:6514;ArmisEWSJSON
    /var/log/armis-forwarded/ews.log;ArmisEWSJSON
    & stop
}

# ============================================================================
# Attacker/Kali Container Logs  
# ============================================================================

# Parse Kali attack tool logs
:programname, isequal, "kali_attack" {
    $template ArmisAttackJSON,"<%pri%>%timestamp:::date-rfc3339% %hostname% kali_attack @cee: {\"host\":\"%hostname%\",\"source\":\"ot-lab\",\"device_type\":\"Attacker\",\"component\":\"kali\",\"alert_type\":\"attack-activity\",\"message\":\"%msg%\"}\n"
    
    # Forward to Armis for threat correlation
    @@logs.armis.com:6514;ArmisAttackJSON
    
    # Keep local copy
    /var/log/armis-forwarded/attacks.log;ArmisAttackJSON
    & stop
}

# ============================================================================
# Catch-All: Generic OT Traffic Logs
# ============================================================================

# Forward any other ot-lab tagged messages
:programname, startswith, "ot-" {
    $template ArmisGenericJSON,"<%pri%>%timestamp:::date-rfc3339% %hostname% %syslogtag% @cee: {\"host\":\"%hostname%\",\"source\":\"ot-lab\",\"message\":\"%msg%\"}\n"
    
    @@logs.armis.com:6514;ArmisGenericJSON
    /var/log/armis-forwarded/generic.log;ArmisGenericJSON
    & stop
}

# ============================================================================
# Default Logging (If no matches above)
# ============================================================================

# Log everything else locally (as backup)
*.*     /var/log/armis-forwarded/all.log;ArmisFmt

# Stop processing to avoid double logging
& stop
