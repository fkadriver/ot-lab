#cloud-config
# Bootstraps the Azure OT Lab VM with Docker, QEMU/KVM, and dependencies.
# Runs once at first boot — takes ~5 minutes to complete.
# Progress: sudo tail -f /var/log/cloud-init-output.log

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - git
  - python3
  - python3-pip
  - iproute2
  - tcpdump
  - socat
  - qemu-kvm
  - qemu-utils
  - ovmf
  - cpu-checker

runcmd:
  # Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -qq
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker

  # Add the admin user to the docker group
  - usermod -aG docker ${ADMIN_USER:-labadmin}
  - usermod -aG kvm    ${ADMIN_USER:-labadmin}

  # KVM availability check (nested virt required for Armis collector VM)
  - kvm-ok || echo "WARNING: KVM not available — Armis collector VM will not start"

  # Kernel parameter required by OpenSearch (Wazuh) if enabled later
  - echo 'vm.max_map_count=262144' > /etc/sysctl.d/99-ot-lab.conf
  - sysctl -w vm.max_map_count=262144

  # Clone the lab repo
  - git clone --recursive https://github.com/YOUR_ORG/ot-lab_azure.git /opt/ot-lab
  - chown -R ${ADMIN_USER:-labadmin}:${ADMIN_USER:-labadmin} /opt/ot-lab

final_message: |
  OT Lab VM bootstrap complete.
  SSH in and run:
    cd /opt/ot-lab
    cp .env.armis.example .env.armis   # fill in Armis credentials
    ./scripts/start-lab.sh grfics --armis
