# GRFICSv3 Azure network override
# Replaces the macvlan driver (used on bare-metal/WSL2) with Docker bridge
# networks. Azure VM NICs enforce strict MAC filtering at the hypervisor,
# which silently drops macvlan subinterface traffic. Bridge networks carry
# the same subnets and IPs — all lab functionality is identical.

services:
  kali:
    volumes:
      - ../scripts:/opt/lab-scripts:ro

networks:
  b-ics-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.95.0/24
          gateway: 192.168.95.1

  c-dmz-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.90.0/24
          gateway: 192.168.90.1
